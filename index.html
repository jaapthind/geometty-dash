<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICE AGE: THE MASTERPIECE [ULTIMATE MONOLITH ENGINE]</title>
    
    <style>
        /* ==========================================================================
           1. CORE VARIABLES & STRICT RESET
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700;800&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-dark: #05080c;
            --panel-bg: rgba(10, 15, 25, 0.95);
            --path-teal: #20b2aa;
            --path-dark: #008080;
            --text-red: #ff1744;
            --stop-red: #d50000;
            --gold: #FFD700;
            --ui-cyan: #00E5FF;
            --font-main: 'Changa', sans-serif;
            --font-code: 'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; outline: none; }

        /* STRICT FIX: Use dvh (Dynamic Viewport Height) to account for taskbars/URL bars */
        html, body {
            background-color: var(--bg-dark);
            color: #ffffff; 
            font-family: var(--font-main);
            width: 100vw; 
            height: 100dvh; 
            overflow: hidden;
            display: flex; 
            flex-direction: column;
            position: relative;
        }

        /* Ambient Day/Night Background Cycle */
        #ambient-bg {
            position: fixed; inset: 0; z-index: -10;
            background: radial-gradient(circle at 50% 50%, #111a24 0%, var(--bg-dark) 100%);
            transition: background 10s ease-in-out;
        }
        #ambient-bg.night-mode {
            background: radial-gradient(circle at 50% 50%, #03040a 0%, #000000 100%);
        }

        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; opacity: 0.2;
        }

        /* Hardware Layers */
        #layer-weather { position: fixed; inset: 0; pointer-events: none; z-index: 1000; mix-blend-mode: screen; opacity: 0.5; transition: opacity 2s; }
        .weather-blizzard { background-image: radial-gradient(circle, #FFF 2px, transparent 3px), radial-gradient(circle, #FFF 1px, transparent 2px); background-size: 60px 60px, 30px 30px; animation: blizzardFall 3s linear infinite; opacity: 1 !important; }
        @keyframes blizzardFall { 0% { background-position: 0px 0px, 0px 0px; } 100% { background-position: 60px 100dvh, 30px 50dvh; } }
        #fx-canvas { position: fixed; inset: 0; width: 100vw; height: 100dvh; pointer-events: none; z-index: 9000; }

        /* ==========================================================================
           2. DYNAMIC LOBBY & PLAYER SELECTOR
           ========================================================================== */
        #lobby-screen {
            position: absolute; inset: 0; z-index: 5000;
            background: rgba(5, 8, 12, 0.95); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .lobby-container {
            width: 95%; max-width: 900px; background: var(--panel-bg);
            border: 2px solid var(--ui-cyan); border-radius: 16px;
            padding: 40px; box-shadow: 0 0 50px rgba(0, 229, 255, 0.2);
            text-align: center; max-height: 95dvh; overflow-y: auto;
        }

        .lobby-title { font-size: clamp(3rem, 6vw, 4.5rem); color: #fff; text-transform: uppercase; text-shadow: 0 0 20px var(--ui-cyan); margin-bottom: 5px; line-height: 1; }
        .lobby-subtitle { font-size: 1.2rem; color: var(--gold); margin-bottom: 30px; letter-spacing: 3px; }

        .player-count-selector {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;
        }
        
        .btn-count {
            background: #111; border: 2px solid #333; color: #888; padding: 10px 30px;
            font-size: 1.5rem; font-weight: bold; font-family: var(--font-main);
            border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .btn-count.active { background: var(--ui-cyan); color: #000; border-color: var(--ui-cyan); box-shadow: 0 0 15px var(--ui-cyan); }

        .player-input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }

        .input-group {
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 10px;
            transition: 0.3s;
        }

        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-row select { background: #111; color: #fff; border: 1px solid var(--ui-cyan); font-size: 2rem; padding: 5px; border-radius: 8px; cursor: pointer; }
        .input-row input { flex: 1; background: transparent; border: none; border-bottom: 2px solid var(--ui-cyan); color: #fff; font-family: var(--font-main); font-size: 1.5rem; font-weight: bold; padding: 5px; text-transform: uppercase; }
        .input-row input:focus { border-bottom-color: var(--gold); }
        .passive-desc { font-size: 0.85rem; color: #8892b0; text-align: left; }

        .btn-launch {
            width: 100%; padding: 20px; font-family: var(--font-main); font-size: 2rem; font-weight: 800;
            background: linear-gradient(180deg, var(--gold), #b8860b); color: #000;
            border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 8px 0 #8b6508, 0 15px 30px rgba(0,0,0,0.8); transition: 0.1s;
        }
        .btn-launch:active { transform: translateY(8px); box-shadow: 0 0px 0 #8b6508, 0 5px 10px rgba(0,0,0,0.8); }

        /* ==========================================================================
           3. MAIN GAME UI (STRICT TASKBAR/OVERFLOW FIXES)
           ========================================================================== */
        #game-interface { display: none; width: 100vw; height: 100dvh; flex-direction: row; min-height: 0; min-width: 0; }

        /* SIDEBAR */
        #sidebar {
            flex: 0 0 350px; background: var(--panel-bg); border-right: 2px solid var(--ui-cyan);
            display: flex; flex-direction: column; z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            min-height: 0; /* Prevents flex blowout */
        }
        @media (max-width: 900px) { #game-interface { flex-direction: column; } #sidebar { flex: 0 0 auto; height: 250px; border-right: none; border-bottom: 2px solid var(--ui-cyan); } }

        .sidebar-header { padding: 15px; text-align: center; border-bottom: 2px solid rgba(0, 229, 255, 0.2); }
        .sidebar-header h2 { font-size: 2.5rem; color: #fff; text-shadow: 0 0 15px var(--ui-cyan); line-height: 1; }

        #roster-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: var(--ui-cyan); border-radius: 10px; }

        .player-card {
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 12px; display: grid; grid-template-columns: auto 1fr; gap: 15px; align-items: center; position: relative;
        }
        .player-card.active-turn { background: linear-gradient(90deg, rgba(0,229,255,0.15), rgba(0,0,0,0.9)); border-color: var(--ui-cyan); transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,229,255,0.2); border-left: 6px solid var(--ui-cyan); }
        
        .card-avatar { font-size: 2.5rem; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.8)); }
        .card-info h3 { font-size: 1.2rem; margin-bottom: 2px; text-transform: uppercase; line-height: 1; }
        .card-stats { display: flex; gap: 15px; font-size: 1.1rem; font-weight: bold; }
        .stat-acorn { color: var(--gold); }
        .stat-ally { color: var(--ui-cyan); }
        .status-badge { position: absolute; top: 8px; right: 8px; background: var(--text-red); color: #fff; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .sidebar-controls { padding: 15px; border-top: 2px solid rgba(0, 229, 255, 0.2); background: #000; flex-shrink: 0; }

        .btn-action {
            width: 100%; padding: 15px; font-family: var(--font-main); font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(180deg, var(--ui-cyan), #0097a7); color: #000;
            border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 0 #006064;
        }
        .btn-action:active { transform: translateY(5px); box-shadow: 0 0px 0 #006064; }
        .btn-action:disabled { background: #333; color: #666; box-shadow: 0 5px 0 #111; cursor: not-allowed; }

        .terminal-box { height: 100px; background: #030508; border-radius: 6px; margin-top: 10px; padding: 8px; font-family: var(--font-code); font-size: 0.8rem; overflow-y: auto; border: 1px solid #1e293b; color: #8892b0; }
        .log-entry { margin-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }

        /* STRICT CLAMPED BOARD ARENA */
        #board-arena {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 2vmin; min-height: 0; min-width: 0; overflow: hidden; position: relative;
        }

        #tactical-matrix {
            /* This math guarantees it never overflows the parent container while maintaining 14/9 ratio */
            width: min(100%, calc(100% * 14 / 9));
            height: min(100%, calc(100vw * 9 / 14)); /* Fallback calculation */
            max-width: 100%; max-height: 100%;
            aspect-ratio: 14 / 9;
            
            display: grid; grid-template-columns: repeat(14, 1fr); grid-template-rows: repeat(9, 1fr);
            background: transparent; border: clamp(4px, 1vw, 12px) solid #111; border-radius: clamp(8px, 1.5vw, 16px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); position: relative;
            transition: transform 0.3s ease-out; /* For camera dynamics */
        }

        /* BIOMES */
        .biome-quad { position: absolute; z-index: -1; }
        .quad-grass { top: 0; left: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #a5d6a7, #66bb6a); border-bottom: 3px solid #111; border-right: 3px solid #111; }
        .quad-mountains { top: 0; right: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #b0bec5, #78909c); border-bottom: 3px solid #111; }
        .quad-village { bottom: 0; left: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #d7ccc8, #a1887f); border-right: 3px solid #111; }
        .quad-tundra { bottom: 0; right: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #e0f7fa, #80deea); }

        /* SPACES */
        .board-space {
            background-color: var(--path-teal); border: clamp(1px, 0.3vw, 2px) solid #000;
            color: var(--text-red); font-weight: 800; font-size: clamp(0.4rem, 1vw, 1rem);
            text-transform: uppercase; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 2px; position: relative; z-index: 10; box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
        }
        .space-label { width: 100%; word-wrap: break-word; line-height: 1; }
        .space-question { font-size: clamp(1.5rem, 3vw, 3.5rem); line-height: 1; text-shadow: 2px 2px 0 #000; color: #fff; }
        .space-stop { background: linear-gradient(180deg, #ff1744, #b71c1c); color: #fff; border: 2px solid #fff; border-radius: 6px; padding: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); line-height: 1; }

        /* TOKENS */
        .token-nest { position: absolute; bottom: 2px; left: 0; width: 100%; height: 40%; display: flex; justify-content: center; align-items: flex-end; gap: 2px; z-index: 30; }
        .entity-token {
            width: clamp(14px, 2.5vw, 32px); height: clamp(14px, 2.5vw, 32px);
            border-radius: 50%; border: clamp(1px, 0.3vw, 3px) solid #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(8px, 1.5vw, 18px); filter: drop-shadow(0 3px 4px rgba(0,0,0,0.8));
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .anim-jump { animation: jumpFX 0.3s ease-out; }
        @keyframes jumpFX { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(clamp(-15px, -3vw, -30px)) scale(1.3); } }

        /* CENTER CORE */
        #center-core { grid-area: 2 / 2 / 9 / 14; z-index: 5; position: relative; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; }
        .core-logo { font-size: clamp(3rem, 8vw, 10rem); font-weight: 800; color: #fff; text-shadow: 4px 4px 0 var(--path-dark), -4px -4px 0 var(--path-dark); opacity: 0.8; pointer-events:none;}
        
        .trade-building {
            position: absolute; left: 5%; bottom: 5%; width: 22%; height: 28%;
            background: #add8e6; border: clamp(2px, 0.5vw, 5px) solid #111; border-radius: 8px;
            padding: 5px; color: #000; font-weight: bold; text-align: center;
            display: flex; flex-direction: column; justify-content: center; box-shadow: 5px 5px 0 rgba(0,0,0,0.5);
        }
        .trade-building h4 { border-bottom: 2px solid #000; margin-bottom: 4px; font-size: clamp(0.6rem, 1.2vw, 1.2rem); }
        .trade-building p { font-size: clamp(0.5rem, 1vw, 1rem); margin-bottom: 2px; }

        .discard-pile {
            position: absolute; right: 5%; bottom: 5%; width: 16%; height: 32%;
            background: #7b68ee; border: clamp(2px, 0.5vw, 5px) solid #111; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: clamp(0.8rem, 1.8vw, 2.2rem); font-weight: bold; text-align: center;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.5); line-height: 1.1;
        }

        /* ==========================================================================
           4. MODALS & 3D CSS
           ========================================================================== */
        .system-overlay { position: fixed; inset: 0; background: rgba(0,5,15,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-container { background: var(--panel-bg); border: 2px solid var(--ui-cyan); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 20px 60px rgba(0, 229, 255, 0.2); animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-container h2 { font-size: 2rem; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; }
        .modal-container p { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.4; color: #e2e8f0; }

        .btn-grid { display: flex; flex-direction: column; gap: 10px; }
        .btn-modal { background: linear-gradient(90deg, #1e293b, #0f172a); border: 2px solid var(--ui-cyan); color: var(--ui-cyan); padding: 12px; font-size: 1.1rem; font-family: var(--font-main); text-transform: uppercase; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .btn-modal:hover { background: var(--ui-cyan); color: #000; }

        /* 3D DICE RENDERER */
        .dice-scene { width: 120px; height: 120px; perspective: 600px; margin: 0 auto 30px auto; }
        .dice-cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dice-face { position: absolute; width: 120px; height: 120px; background: #fff; border: 4px solid #333; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: bold; color: #111; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }
        .df-front  { transform: rotateY(0deg) translateZ(60px); } .df-back   { transform: rotateY(180deg) translateZ(60px); }
        .df-right  { transform: rotateY(90deg) translateZ(60px); } .df-left   { transform: rotateY(-90deg) translateZ(60px); }
        .df-top    { transform: rotateX(90deg) translateZ(60px); } .df-bottom { transform: rotateX(-90deg) translateZ(60px); }

        /* 3D CARD */
        .event-card { background: #fff; color: #111; width: 280px; height: 380px; margin: 0 auto 20px auto; border-radius: 16px; border: 8px solid #7b68ee; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; animation: cardFlip 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardFlip { 0% { transform: rotateY(180deg) scale(0.5); opacity: 0; } 100% { transform: rotateY(0deg) scale(1); opacity: 1; } }
        .card-icon { font-size: 5rem; margin-bottom: 20px; }
        .card-text { font-size: 1.3rem; font-weight: bold; line-height: 1.3; }

    </style>
</head>

            <div id="modal-actions" class="btn-grid"></div>

    </div>

    { text: "Sabertooth Ambush! Sacrifice 1 ally or drop 2 acorns.", icon: "🐅", action: "ambush" },
    { text: "Mammoth Ride! A friendly giant carries you forward 3 spaces.", icon: "🦣", action: "move", val: 3 },
    { text: "Black Ice! You slipped and slid backwards 2 spaces.", icon: "🧊", action: "move", val: -2 },
    { text: "Avalanche! Buried in snow. Lose your next turn.", icon: "🏔️", action: "freeze" },
    { text: "Villager Gift! A local tosses you a golden acorn.", icon: "⛺", action: "acorn", val: 1 },
    { text: "Alpha Pack! A stray Dire Wolf joins you. +1 Ally.", icon: "🐺", action: "ally", val: 1 },
    { text: "Thin Ice! You dropped a golden acorn into the water.", icon: "💧", action: "lose", val: 1 }
];

const PASSIVES = {
    "🐿️": "Scavenger: Gains +1 extra acorn on acorn spaces.",
    "🦣": "Thick Hide: Immune to Avalanche (Freeze) events.",
    "🐯": "Predator: Steals 1 extra acorn during ambush if no allies.",
    "🦥": "Friendly: Gains +1 extra ally on ally spaces."
};

// 2. AUDIO & FX
class AudioSystem {
    constructor() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    playTone(freq, type, dur, vol = 0.1) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.02); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + dur);
    }
    sfxHop() { this.playTone(400, 'sine', 0.1, 0.2); setTimeout(() => this.playTone(600, 'sine', 0.15, 0.1), 80); }
    sfxCoin() { this.playTone(1200, 'square', 0.1, 0.1); setTimeout(() => this.playTone(1800, 'square', 0.2, 0.1), 100); }
    sfxTrap() { this.playTone(150, 'sawtooth', 0.4, 0.3); }
    sfxCard() { this.playTone(800, 'triangle', 0.1, 0.2); }
    sfxDice() { this.playTone(800 + Math.random()*400, 'sine', 0.05, 0.05); }
}
const AudioFX = new AudioSystem();

class ParticleSystem {
    constructor() {
        this.canvas = document.getElementById('fx-canvas'); this.ctx = this.canvas.getContext('2d');
        this.particles = []; this.resize(); window.addEventListener('resize', () => this.resize()); this.loop();
    }
    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
    emit(id, color, count) {
        let el = document.getElementById(id); if(!el) return; let r = el.getBoundingClientRect();
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2, speed = Math.random() * 8 + 2;
            this.particles.push({ x: r.left + r.width/2, y: r.top + r.height/2, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 5, life: 1.0, decay: Math.random()*0.02 + 0.01, color: color, size: Math.random()*5 + 2 });
        }
    }
    loop() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        for(let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i]; p.vy += 0.25; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
            if(p.life <= 0) this.particles.splice(i, 1);
            else { this.ctx.globalAlpha = p.life; this.ctx.fillStyle = p.color; this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); this.ctx.fill(); }
        }
        requestAnimationFrame(() => this.loop());
    }
}
const FX = new ParticleSystem();

// 3. LOBBY UI LOGIC
const LobbyUI = {
    playerCount: 4,
    presets: [
        { n: "Scrat", i: "🐿️" }, { n: "Manny", i: "🦣" }, 
        { n: "Diego", i: "🐯" }, { n: "Sid", i: "🦥" }
    ],
    init() { this.renderInputs(); },
    setPlayers(num) {
        this.playerCount = num;
        document.querySelectorAll('.btn-count').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${num}p`).classList.add('active');
        this.renderInputs();
    },
    renderInputs() {
        let container = document.getElementById('player-inputs'); container.innerHTML = '';
        for(let i=0; i<this.playerCount; i++) {
            let p = this.presets[i];
            let opts = this.presets.map(x => `<option ${x.i===p.i?'selected':''}>${x.i}</option>`).join('');
            container.innerHTML += `
                <div class="input-group">
                    <div class="input-row">
                        <select id="cfg-p${i}-icon" onchange="LobbyUI.updatePassive(${i})">${opts}</select>
                        <input type="text" id="cfg-p${i}-name" value="${p.n}" maxlength="12" placeholder="PLAYER ${i+1}">
                    </div>
                    <div class="passive-desc" id="pass-p${i}">${PASSIVES[p.i]}</div>
                </div>`;
        }
    },
    updatePassive(idx) {
        let icon = document.getElementById(`cfg-p${idx}-icon`).value;
        document.getElementById(`pass-p${idx}`).innerText = PASSIVES[icon];
    }
};
LobbyUI.init();

// 4. MAIN ENGINE
class Player {
    constructor(id, name, icon, color) {
        this.id = id; this.name = name; this.icon = icon; this.color = color;
        this.position = 0; this.acorns = 0; this.allies = 0; this.isFrozen = false;
    }
    modifyAcorns(amt, engineTrigger = false) {
        if(amt > 0 && engineTrigger && this.icon === "🐿️") amt += 1; // Scrat Passive
        let realAmt = amt < 0 ? Math.min(this.acorns, Math.abs(amt)) : amt;
        this.acorns += amt < 0 ? -realAmt : realAmt;
        if(realAmt > 0) FX.emit(`token-${this.id}`, '#FFD700', 30);
    }
    modifyAllies(amt) {
        if(amt > 0 && this.icon === "🦥") amt += 1; // Sid Passive
        this.allies += amt;
    }
}

const Engine = {
    roster: [], turnIdx: 0, isBusy: false, deck: [], discard: [], dayCycle: 0,
    
    initializeMatch() {
        let colors = ["#ff9800", "#8d6e63", "#f44336", "#4caf50"];
        for(let i=0; i<LobbyUI.playerCount; i++) {
            let n = document.getElementById(`cfg-p${i}-name`).value.trim() || `Player ${i+1}`;
            let ico = document.getElementById(`cfg-p${i}-icon`).value;
            this.roster.push(new Player(i, n, ico, colors[i]));
        }
        this.deck = [...CARD_DATA].sort(() => Math.random() - 0.5);
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('game-interface').style.display = 'flex';
        
        this.buildBoard(); this.updateUI(); this.log("ENGINE ONLINE.", "sys");
        setInterval(() => this.ambientLoop(), 30000); // Day/Night & Weather
    },

    ambientLoop() {
        this.dayCycle++;
        let bg = document.getElementById('ambient-bg');
        if(this.dayCycle % 2 !== 0) { bg.classList.add('night-mode'); this.log("Night has fallen.", "sys"); }
        else { bg.classList.remove('night-mode'); this.log("A new day dawns.", "sys"); }

        let wLayer = document.getElementById('layer-weather');
        if(Math.random() > 0.7) { wLayer.className = 'weather-blizzard'; this.log("Blizzard warning!", "alert"); }
        else { wLayer.className = ''; }
    },

    executeRollSequence() {
        if(this.isBusy) return; let p = this.roster[this.turnIdx];
        if(p.isFrozen) {
            this.log(`${p.name} is frozen. Turn skipped.`, "danger"); AudioFX.sfxTrap(); p.isFrozen = false; this.endTurn(); return;
        }
        this.isBusy = true; document.getElementById('btn-master-roll').disabled = true;
        let roll = Math.floor(Math.random() * 6) + 1;
        this.triggerDice(p.name, roll, () => { this.log(`${p.name} rolled a ${roll}`); this.processMove(p, roll, false); });
    },

    processMove(p, steps, forced) {
        if(steps === 0) { 
            this.isBusy = false; document.getElementById(`token-${p.id}`).classList.remove('anim-jump');
            this.evaluateSpace(p, MAP_DATA[p.position]); return; 
        }
        let dir = steps > 0 ? 1 : -1; p.position = Math.max(0, Math.min(41, p.position + dir));
        this.updateTokens(true); AudioFX.sfxHop();

        if(!forced && dir > 0 && MAP_DATA[p.position].type === 'stop') {
            this.log(`🛑 JAAP STOP ENGAGED.`, "alert"); this.isBusy = false;
            document.getElementById(`token-${p.id}`).classList.remove('anim-jump');
            this.evaluateSpace(p, MAP_DATA[p.position]); return;
        }
        setTimeout(() => this.processMove(p, dir > 0 ? steps - 1 : steps + 1, forced), 250);
    },

    evaluateSpace(p, sp) {
        this.log(`Landed: [${sp.t}]`);
        switch(sp.type) {
            case 'start': case 'free': case 'stop': this.endTurn(); break;
            case 'acorn': p.modifyAcorns(sp.v, true); AudioFX.sfxCoin(); this.endTurn(); break;
            case 'lose': p.modifyAcorns(-sp.v); AudioFX.sfxTrap(); this.endTurn(); break;
            case 'ally': p.modifyAllies(1); AudioFX.sfxCoin(); this.endTurn(); break;
            case 'move': if(sp.av) { p.modifyAcorns(sp.av); AudioFX.sfxCoin(); } this.isBusy = true; this.processMove(p, sp.v, true); break;
            case 'goto': if(sp.av) { p.modifyAcorns(sp.av); AudioFX.sfxCoin(); } this.isBusy = true; this.processMove(p, sp.tgt - p.position, true); break;
            case 'roll_again': this.log(`BONUS: ${p.name} rolls again.`, "alert"); this.isBusy = false; document.getElementById('btn-master-roll').disabled = false; break;
            case 'adv_type': case 'adv_type_acorn':
                let target = MAP_DATA.findIndex((s, i) => i > p.position && (s.type === sp.tgtType || (sp.tgtType==='free' && s.type==='start')));
                if(target > -1) { if(sp.av) { p.modifyAcorns(sp.av); AudioFX.sfxCoin(); } this.isBusy = true; this.processMove(p, target - p.position, true); } else this.endTurn();
                break;
            case 'deck': this.resolveCard(p); break;
            case 'bridge': this.resolveBridge(p); break;
            case 'trade': this.resolveTrade(p); break;
            case 'end': this.log(`>>> ${p.name} HAS REACHED THE END! <<<`, "alert"); this.endTurn(); break;
        }
        this.updateUI();
    },

    resolveCard(p) {
        if(this.deck.length === 0) { this.deck = [...this.discard].sort(() => Math.random() - 0.5); this.discard = []; this.log("Deck reshuffled."); }
        let c = this.deck.pop(); this.discard.push(c); AudioFX.sfxCard();
        
        let html = `<div class="event-card"><div class="card-icon">${c.icon}</div><div class="card-text">${c.text}</div></div>`;
        this.showModal("EVENT", html, [{ text: "ACCEPT", action: () => {
            if(c.action === 'acorn') p.modifyAcorns(c.val);
            if(c.action === 'lose') p.modifyAcorns(-c.val);
            if(c.action === 'ally') p.modifyAllies(c.val);
            if(c.action === 'move') return this.processMove(p, c.val, true);
            if(c.action === 'freeze') {
                if(p.icon === "🦣") { this.log(`${p.name}'s Thick Hide ignored the freeze!`, "sys"); }
                else { p.isFrozen = true; }
            }
            if(c.action === 'ambush') { 
                if(p.allies > 0) p.allies--; 
                else { 
                    p.modifyAcorns(-2); 
                    if(p.icon === "🐯") { this.log(`${p.name} counter-attacked and stole an acorn!`, "sys"); p.modifyAcorns(1); }
                } 
            }
            this.endTurn();
        }}]);
    },

    resolveBridge(p) {
        this.showModal("ICE BRIDGE", "<p>Roll the die to cross.<br><span style='color:var(--ui-cyan)'>[4-6]</span> +2 🌰<br><span style='color:var(--text-red)'>[1-3]</span> Fall back 3.</p>", [{ text: "ROLL", action: () => {
            let r = Math.floor(Math.random() * 6) + 1;
            if(r >= 4) { p.modifyAcorns(2); AudioFX.sfxCoin(); this.showModal("SUCCESS", `<p>Rolled ${r}. Safe! (+2 🌰)</p>`, [{text:"OK", action: () => this.endTurn()}]); }
            else { AudioFX.sfxTrap(); this.showModal("COLLAPSE", `<p>Rolled ${r}. Bridge broke!</p>`, [{text:"FALL", action: () => this.processMove(p, -3, true)}]); }
        }}]);
    },

    resolveTrade(p) {
        this.showModal("VILLAGE TRADE", `<p>Inventory: <span style="color:var(--gold)">${p.acorns} 🌰</span> | <span style="color:var(--ui-cyan)">${p.allies} 🤝</span></p>`, [
            { text: "4 🌰 -> 1 🤝", action: () => { if(p.acorns >= 4) { p.modifyAcorns(-4); p.allies++; AudioFX.sfxCoin(); this.updateUI(); this.resolveTrade(p); } else { alert("Not enough Acorns."); this.resolveTrade(p); } }},
            { text: "1 🤝 -> 2 🌰", action: () => { if(p.allies >= 1) { p.allies--; p.modifyAcorns(2); AudioFX.sfxCoin(); this.updateUI(); this.resolveTrade(p); } else { alert("Not enough Allies."); this.resolveTrade(p); } }},
            { text: "LEAVE", action: () => this.endTurn() }
        ]);
    },

    endTurn() {
        this.isBusy = false;
        if(this.roster.every(pl => pl.position === 41)) {
            let win = [...this.roster].sort((a,b) => b.acorns - a.acorns)[0];
            FX.emit(`token-${win.id}`, '#FFD700', 100);
            this.showModal("GAME OVER", `<h2>WINNER: ${win.name}</h2><p>Score: ${win.acorns} 🌰</p>`, [{ text: "RESTART", action: () => location.reload() }]); return;
        }
        do { this.turnIdx = (this.turnIdx + 1) % this.roster.length; } while (this.roster[this.turnIdx].position === 41);
        document.getElementById('btn-master-roll').disabled = false; this.updateUI();
    },

    /* UI HELPERS */
    buildBoard() {
        const grid = document.getElementById('tactical-matrix');
        MAP_DATA.forEach((sp, i) => {
            let el = document.createElement('div'); el.className = 'board-space';
            if (sp.type === 'deck') el.innerHTML = `<div class="space-question">?</div>`; else if (sp.type === 'stop') el.innerHTML = `<div class="space-stop">${sp.t}</div>`; else el.innerHTML = `<div class="space-label">${sp.t}</div>`;
            let nest = document.createElement('div'); nest.className = 'token-nest'; nest.id = `nest-${i}`; el.appendChild(nest);
            let col, row; if (i <= 13) { row = 1; col = i + 1; } else if (i <= 20) { col = 14; row = (i - 13) + 1; } else if (i <= 34) { row = 9; col = 14 - (i - 21); } else { col = 1; row = 9 - (i - 34); }
            el.style.gridColumn = col; el.style.gridRow = row; grid.appendChild(el);
        });
        this.updateTokens();
    },
    updateTokens(anim = false) {
        document.querySelectorAll('.token-nest').forEach(n => n.innerHTML = '');
        this.roster.forEach(p => {
            let t = document.createElement('div'); t.className = `entity-token ${anim && p.id === this.turnIdx ? 'anim-jump' : ''}`;
            t.id = `token-${p.id}`; t.style.borderColor = p.color; t.style.boxShadow = `inset 0 0 10px ${p.color}, 0 0 10px ${p.color}`; t.innerText = p.icon;
            document.getElementById(`nest-${p.position}`).appendChild(t);
        });
    },
    updateUI() {
        let box = document.getElementById('roster-list'); box.innerHTML = '';
        this.roster.forEach((p, i) => {
            let act = i === this.turnIdx ? 'active-turn' : '';
            box.innerHTML += `<div class="player-card ${act}"><div class="card-avatar">${p.icon}</div><div class="card-info"><h3 style="color:${p.color}">${p.name}</h3><div class="card-stats"><span class="stat-acorn">🌰 ${p.acorns}</span><span class="stat-ally">🤝 ${p.allies}</span></div></div>${p.isFrozen ? '<div class="status-badge">TRAPPED</div>' : ''}</div>`;
        });
    },
    log(msg, type = '') {
        let t = document.getElementById('sys-log');
        let d = new Date(), ts = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
        t.innerHTML = `<div class="log-entry ${type}">[${ts}] ${msg}</div>` + t.innerHTML;
    },
    showModal(title, body, btns) {
        document.getElementById('modal-title').innerText = title; document.getElementById('modal-body').innerHTML = body;
        let bBox = document.getElementById('modal-actions'); bBox.innerHTML = '';
        btns.forEach(b => { let btn = document.createElement('button'); btn.className = 'btn-modal'; btn.innerText = b.text; btn.onclick = () => { document.getElementById('overlay-modal').style.display = 'none'; b.action(); }; bBox.appendChild(btn); });
        document.getElementById('overlay-modal').style.display = 'flex';
    },
    triggerDice(name, res, cb) {
        let ov = document.getElementById('overlay-dice'); document.getElementById('dice-header').innerText = `${name} ROLLING...`; ov.style.display = 'flex';
        let mesh = document.getElementById('dice-mesh');
        let rx = Math.floor(Math.random() * 4) * 360 + 720, ry = Math.floor(Math.random() * 4) * 360 + 720;
        let frx = 0, fry = 0; switch(res) { case 1: break; case 6: fry=-180; break; case 3: fry=-90; break; case 4: fry=90; break; case 2: frx=-90; break; case 5: frx=90; break; }
        mesh.style.transform = `rotateX(${rx + frx}deg) rotateY(${ry + fry}deg)`;
        let tick = setInterval(() => AudioFX.sfxDice(), 100);
        setTimeout(() => { clearInterval(tick); AudioFX.sfxTrap(); setTimeout(() => { ov.style.display = 'none'; mesh.style.transition = 'none'; mesh.style.transform = `rotateX(0deg) rotateY(0deg)`; setTimeout(() => { mesh.style.transition = 'transform 1s ease-out'; cb(); }, 50); }, 600); }, 1000);
    }
};
</script>
