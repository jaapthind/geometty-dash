<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICE AGE: THE ORIGINAL MASTERPIECE [HEAVY ENGINE]</title>
    
    <style>
        /* ==========================================================================
           1. CORE VARIABLES & GLOBAL RESET
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700;800&family=Share+Tech+Mono&display=swap');

        :root {
            /* Palette */
            --bg-dark: #05080c;
            --panel-bg: rgba(10, 15, 25, 0.95);
            --path-teal: #20b2aa;
            --path-dark: #008080;
            --text-red: #ff1744;
            --stop-red: #d50000;
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.6);
            --ui-cyan: #00E5FF;
            --ui-cyan-glow: rgba(0, 229, 255, 0.4);
            
            /* Typography */
            --font-main: 'Changa', sans-serif;
            --font-code: 'Share Tech Mono', monospace;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            outline: none;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #111a24 0%, var(--bg-dark) 100%);
            color: #ffffff; 
            font-family: var(--font-main);
            height: 100vh; 
            width: 100vw; 
            overflow: hidden;
            display: flex; 
            flex-direction: column;
        }

        /* Scanline Overlay Effect for AAA feel */
        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; opacity: 0.3;
        }

        /* ==========================================================================
           2. HARDWARE ACCELERATED CANVAS LAYERS
           ========================================================================== */
        #layer-weather {
            position: fixed; inset: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 1000; mix-blend-mode: screen; opacity: 0.5;
        }
        
        .weather-blizzard {
            background-image: radial-gradient(circle, #FFF 2px, transparent 3px), radial-gradient(circle, #FFF 1px, transparent 2px);
            background-size: 60px 60px, 30px 30px;
            animation: blizzardFall 3s linear infinite;
        }

        @keyframes blizzardFall {
            0% { background-position: 0px 0px, 0px 0px; }
            100% { background-position: 60px 100vh, 30px 50vh; }
        }

        #fx-canvas {
            position: fixed; inset: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9000;
        }

        /* ==========================================================================
           3. LOBBY / CHARACTER CREATION SCREEN
           ========================================================================== */
        #lobby-screen {
            position: absolute; inset: 0; z-index: 5000;
            background: rgba(5, 8, 12, 0.95); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .lobby-container {
            width: 90%; max-width: 800px; background: var(--panel-bg);
            border: 2px solid var(--ui-cyan); border-radius: 16px;
            padding: 40px; box-shadow: 0 0 50px rgba(0, 229, 255, 0.2);
            text-align: center;
        }

        .lobby-title {
            font-size: 4rem; color: #fff; text-transform: uppercase;
            text-shadow: 0 0 20px var(--ui-cyan); margin-bottom: 10px; line-height: 1;
        }

        .lobby-subtitle {
            font-size: 1.5rem; color: var(--gold); margin-bottom: 40px; letter-spacing: 4px;
        }

        .player-input-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;
        }

        .input-group {
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px;
        }

        .input-group input {
            flex: 1; background: transparent; border: none; border-bottom: 2px solid var(--ui-cyan);
            color: #fff; font-family: var(--font-main); font-size: 1.5rem; font-weight: bold;
            padding: 5px; text-transform: uppercase;
        }

        .input-group input:focus { border-bottom-color: var(--gold); }

        .input-group select {
            background: #111; color: #fff; border: 1px solid var(--ui-cyan);
            font-size: 2rem; padding: 5px; border-radius: 8px; cursor: pointer;
        }

        .btn-launch {
            width: 100%; padding: 20px; font-family: var(--font-main); font-size: 2rem; font-weight: 800;
            background: linear-gradient(180deg, var(--gold), #b8860b); color: #000;
            border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 8px 0 #8b6508, 0 15px 30px rgba(0,0,0,0.8); transition: 0.1s;
        }

        .btn-launch:active { transform: translateY(8px); box-shadow: 0 0px 0 #8b6508, 0 5px 10px rgba(0,0,0,0.8); }

        /* ==========================================================================
           4. MAIN GAME UI LAYOUT
           ========================================================================== */
        #game-interface {
            display: none; width: 100vw; height: 100vh; flex-direction: row;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            flex: 0 0 400px; background: var(--panel-bg); border-right: 2px solid var(--ui-cyan);
            display: flex; flex-direction: column; z-index: 100; box-shadow: 15px 0 40px rgba(0,0,0,0.8);
        }

        .sidebar-header {
            padding: 20px; text-align: center; border-bottom: 2px solid rgba(0, 229, 255, 0.2);
        }
        
        .sidebar-header h2 { font-size: 3rem; color: #fff; text-shadow: 0 0 15px var(--ui-cyan); line-height: 1; }

        #roster-list {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: var(--ui-cyan); border-radius: 10px; }

        .player-card {
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; display: grid; grid-template-columns: auto 1fr; gap: 15px;
            align-items: center; position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .player-card.active-turn {
            background: linear-gradient(90deg, rgba(0,229,255,0.15), rgba(0,0,0,0.9));
            border-color: var(--ui-cyan); transform: translateX(10px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,229,255,0.2); border-left: 8px solid var(--ui-cyan);
        }

        .card-avatar { font-size: 3rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8)); }
        .card-info h3 { font-size: 1.5rem; color: #fff; margin-bottom: 5px; text-transform: uppercase; }
        .card-stats { display: flex; gap: 20px; font-size: 1.2rem; font-weight: bold; }
        .stat-acorn { color: var(--gold); }
        .stat-ally { color: var(--ui-cyan); }
        
        .status-badge {
            position: absolute; top: 10px; right: 10px; background: var(--text-red);
            color: #fff; font-size: 0.8rem; padding: 4px 8px; border-radius: 6px; font-weight: bold;
        }

        .sidebar-controls {
            padding: 20px; border-top: 2px solid rgba(0, 229, 255, 0.2); background: #000;
        }

        .btn-action {
            width: 100%; padding: 20px; font-family: var(--font-main); font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(180deg, var(--ui-cyan), #0097a7); color: #000;
            border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 0 #006064, 0 10px 20px rgba(0,0,0,0.8); transition: 0.1s;
        }
        
        .btn-action:active { transform: translateY(6px); box-shadow: 0 0px 0 #006064; }
        .btn-action:disabled { background: #333; color: #666; box-shadow: 0 6px 0 #111; cursor: not-allowed; }

        .terminal-box {
            height: 150px; background: #030508; border-radius: 8px; margin-top: 15px;
            padding: 10px; font-family: var(--font-code); font-size: 0.9rem;
            overflow-y: auto; color: #8892b0; border: 1px solid #1e293b;
        }
        
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3px; }
        .log-entry.alert { color: var(--gold); }
        .log-entry.danger { color: var(--text-red); }
        .log-entry.sys { color: var(--ui-cyan); }

        /* --- TACTICAL BOARD AREA --- */
        #board-arena {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 40px; position: relative;
        }

        /* STRICT MATH CLAMPING: 
           The board is exactly 14 columns by 9 rows (Aspect Ratio 14/9).
           We use vmin to ensure it NEVER flows off the screen. */
        #tactical-matrix {
            display: grid; 
            grid-template-columns: repeat(14, 1fr); 
            grid-template-rows: repeat(9, 1fr);
            width: 100%; max-width: 1600px; 
            aspect-ratio: 14 / 9;
            background: transparent; border: 12px solid #111; border-radius: 16px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            position: relative;
        }

        /* THE 4 BIOME QUADRANTS */
        .biome-quad { position: absolute; z-index: -1; }
        .quad-grass { top: 0; left: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #a5d6a7, #66bb6a); border-bottom: 4px solid #111; border-right: 4px solid #111; }
        .quad-mountains { top: 0; right: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #b0bec5, #78909c); border-bottom: 4px solid #111; }
        .quad-village { bottom: 0; left: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #d7ccc8, #a1887f); border-right: 4px solid #111; }
        .quad-tundra { bottom: 0; right: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #e0f7fa, #80deea); }

        /* EXACT SPACE STYLING */
        .board-space {
            background-color: var(--path-teal); border: 2px solid #000;
            color: var(--text-red); font-weight: 800; font-size: clamp(0.5rem, 1.2vw, 1rem);
            text-transform: uppercase; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 4px; position: relative; z-index: 10;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
        }

        .space-label { width: 100%; word-wrap: break-word; line-height: 1.1; }
        .space-question { font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1; text-shadow: 2px 2px 0 #000; color: #fff; }
        
        .space-stop {
            background: linear-gradient(180deg, #ff1744, #b71c1c); color: #fff;
            border: 3px solid #fff; border-radius: 8px; padding: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-shadow: 1px 1px 2px #000;
        }

        /* TOKENS */
        .token-nest {
            position: absolute; bottom: 4px; left: 0; width: 100%; height: 40%;
            display: flex; justify-content: center; align-items: flex-end; gap: 4px; z-index: 30;
        }

        .entity-token {
            width: clamp(18px, 2.5vw, 36px); height: clamp(18px, 2.5vw, 36px);
            border-radius: 50%; border: 3px solid #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(12px, 1.5vw, 22px); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .anim-jump { animation: jumpFX 0.4s ease-out; }
        @keyframes jumpFX { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-35px) scale(1.3); } }

        /* CENTER ISLAND DECORATIONS */
        #center-core {
            grid-area: 2 / 2 / 9 / 14; z-index: 5; position: relative;
            background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center;
        }

        .core-logo {
            font-size: clamp(4rem, 8vw, 10rem); font-weight: 800; color: #fff;
            text-shadow: 5px 5px 0 var(--path-dark), -5px -5px 0 var(--path-dark); opacity: 0.8;
        }

        .trade-building {
            position: absolute; left: 5%; bottom: 5%; width: 22%; height: 28%;
            background: #add8e6; border: 5px solid #111; border-radius: 12px;
            padding: 10px; color: #000; font-weight: bold; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.5);
        }
        .trade-building h4 { border-bottom: 3px solid #000; margin-bottom: 8px; font-size: clamp(0.8rem, 1.2vw, 1.4rem); }
        .trade-building p { font-size: clamp(0.7rem, 1vw, 1.1rem); margin-bottom: 5px; }

        .discard-pile {
            position: absolute; right: 5%; bottom: 5%; width: 16%; height: 32%;
            background: #7b68ee; border: 5px solid #111; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: clamp(1.2rem, 1.8vw, 2.5rem); font-weight: bold; text-align: center;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.5); line-height: 1.2;
        }

        /* ==========================================================================
           5. OVERLAYS, MODALS & 3D COMPONENTS
           ========================================================================== */
        .system-overlay {
            position: fixed; inset: 0; background: rgba(0,5,15,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }

        .modal-container {
            background: var(--panel-bg); border: 2px solid var(--ui-cyan);
            padding: 40px; border-radius: 16px; width: 90%; max-width: 600px; text-align: center;
            box-shadow: 0 20px 80px rgba(0, 229, 255, 0.2);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.8) translateY(40px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        .modal-container h2 { font-size: 2.5rem; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; }
        .modal-container p { font-size: 1.3rem; margin-bottom: 30px; line-height: 1.5; color: #e2e8f0; }

        .btn-grid { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-modal {
            background: linear-gradient(90deg, #1e293b, #0f172a); border: 2px solid var(--ui-cyan);
            color: var(--ui-cyan); padding: 15px; font-size: 1.2rem; font-family: var(--font-main);
            text-transform: uppercase; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s;
        }
        .btn-modal:hover { background: var(--ui-cyan); color: #000; box-shadow: 0 0 20px var(--ui-cyan); transform: scale(1.02); }

        /* TRUE 3D DICE RENDERER */
        .dice-scene { width: 140px; height: 140px; perspective: 600px; margin: 0 auto 30px auto; }
        .dice-cube {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dice-face {
            position: absolute; width: 140px; height: 140px; background: #fff; border: 4px solid #333;
            border-radius: 16px; display: flex; justify-content: center; align-items: center;
            font-size: 70px; font-weight: bold; color: #111; box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
        .df-front  { transform: rotateY(0deg) translateZ(70px); }
        .df-back   { transform: rotateY(180deg) translateZ(70px); }
        .df-right  { transform: rotateY(90deg) translateZ(70px); }
        .df-left   { transform: rotateY(-90deg) translateZ(70px); }
        .df-top    { transform: rotateX(90deg) translateZ(70px); }
        .df-bottom { transform: rotateX(-90deg) translateZ(70px); }

        /* 3D EVENT CARD */
        .event-card {
            background: #fff; color: #111; width: 320px; height: 450px; margin: 0 auto 30px auto;
            border-radius: 20px; border: 10px solid #7b68ee; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px;
            animation: cardFlip 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d;
        }
        @keyframes cardFlip { 0% { transform: rotateY(180deg) scale(0.5); opacity: 0; } 100% { transform: rotateY(0deg) scale(1); opacity: 1; } }
        .card-icon { font-size: 6rem; margin-bottom: 25px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        .card-text { font-size: 1.6rem; font-weight: bold; line-height: 1.4; }

    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div id="layer-weather"></div>
    <canvas id="fx-canvas"></canvas>

    <div id="lobby-screen">
        <div class="lobby-container">
            <h1 class="lobby-title">ICE AGE</h1>
            <h2 class="lobby-subtitle">ORIGINAL SURVIVAL ENGINE</h2>
            
            <div class="player-input-grid">
                <div class="input-group">
                    <select id="cfg-p1-icon"><option>🐿️</option><option>🦣</option><option>🐯</option><option>🦥</option></select>
                    <input type="text" id="cfg-p1-name" value="Scrat" maxlength="12" placeholder="PLAYER 1">
                </div>
                <div class="input-group">
                    <select id="cfg-p2-icon"><option>🦣</option><option>🐿️</option><option>🐯</option><option>🦥</option></select>
                    <input type="text" id="cfg-p2-name" value="Manny" maxlength="12" placeholder="PLAYER 2">
                </div>
                <div class="input-group">
                    <select id="cfg-p3-icon"><option>🐯</option><option>🐿️</option><option>🦣</option><option>🦥</option></select>
                    <input type="text" id="cfg-p3-name" value="Diego" maxlength="12" placeholder="PLAYER 3">
                </div>
                <div class="input-group">
                    <select id="cfg-p4-icon"><option>🦥</option><option>🐿️</option><option>🦣</option><option>🐯</option></select>
                    <input type="text" id="cfg-p4-name" value="Sid" maxlength="12" placeholder="PLAYER 4">
                </div>
            </div>

            <button class="btn-launch" onclick="GameDirector.initializeMatch()">INITIALIZE MATCH</button>
        </div>
    </div>

    <div id="game-interface">
        
        <aside id="sidebar">
            <div class="sidebar-header"><h2>ICE AGE</h2></div>
            <div id="roster-list"></div>
            <div class="sidebar-controls">
                <button id="btn-master-roll" class="btn-action" onclick="GameDirector.executeRollSequence()">ROLL DICE 🎲</button>
                <div class="terminal-box" id="sys-log"></div>
            </div>
        </aside>

        <main id="board-arena">
            <div id="tactical-matrix">
                <div class="biome-quad quad-grass"></div>
                <div class="biome-quad quad-mountains"></div>
                <div class="biome-quad quad-village"></div>
                <div class="biome-quad quad-tundra"></div>
                
                <div id="center-core">
                    <div class="core-logo">ICE AGE</div>
                    <div class="trade-building"><h4>VILLAGER TRADES</h4><p>4 🌰 = 1 Ally 🤝</p><p>1 Ally 🤝 = 2 🌰</p></div>
                    <div class="discard-pile">DISCARD<br>PILE</div>
                </div>
                </div>
        </main>
    </div>

    <div id="overlay-dice" class="system-overlay">
        <div style="text-align: center;">
            <h2 id="dice-header" style="font-size: 3rem; color: #fff; margin-bottom: 40px; text-shadow: 0 0 20px var(--ui-cyan);"></h2>
            <div class="dice-scene">
                <div class="dice-cube" id="dice-mesh">
                    <div class="dice-face df-front">1</div>
                    <div class="dice-face df-back">6</div>
                    <div class="dice-face df-right">3</div>
                    <div class="dice-face df-left">4</div>
                    <div class="dice-face df-top">2</div>
                    <div class="dice-face df-bottom">5</div>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay-modal" class="system-overlay">
        <div class="modal-container">
            <h2 id="modal-title">SYSTEM ALERT</h2>
            <div id="modal-body"></div>
            <div id="modal-actions" class="btn-grid"></div>
        </div>
    </div>


<script>
/**
 * ============================================================================
 * ICE AGE: THE ORIGINAL MASTERPIECE [HEAVY ENGINE]
 * JavaScript Architecture: Uncompressed, Object-Oriented, High-Fidelity.
 * ============================================================================
 */

// ----------------------------------------------------------------------------
// DATA DICTIONARY: The Exact 42 Spaces from Original Blueprint
// ----------------------------------------------------------------------------
const MAP_DATA = [

    { text: "Buried Treasure! You dug up a golden acorn from the permafrost.", icon: "❄️", action: "acorn", val: 1 },

// ----------------------------------------------------------------------------
// SUBSYSTEM: WEB AUDIO API (Synthesizer for retro/AAA sound effects)
// ----------------------------------------------------------------------------
class AudioSubsystem {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterVolume = this.ctx.createGain();
        this.masterVolume.gain.value = 0.2; // Safe volume limit
        this.masterVolume.connect(this.ctx.destination);
    }
    
    _generateTone(freq, type, duration, vol = 1) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        
        // Envelope generator to prevent popping
        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        
        osc.connect(gain); 
        gain.connect(this.masterVolume);
        
        osc.start(); 
        osc.stop(this.ctx.currentTime + duration);
    }

    playHop() { 
        this._generateTone(400, 'sine', 0.1, 0.5); 
        setTimeout(() => this._generateTone(600, 'sine', 0.15, 0.4), 80); 
    }
    playCoin() { 
        this._generateTone(1200, 'square', 0.1, 0.3); 
        setTimeout(() => this._generateTone(1800, 'square', 0.2, 0.4), 100); 
    }
    playTrap() { 
        this._generateTone(150, 'sawtooth', 0.4, 0.8); 
    }
    playCardDraw() { 
        this._generateTone(800, 'triangle', 0.1, 0.5); 
    }
    playDiceRoll() {
        this._generateTone(800 + Math.random() * 400, 'sine', 0.05, 0.2);
    }
}
const AudioSYS = new AudioSubsystem();

// ----------------------------------------------------------------------------
// SUBSYSTEM: PARTICLE PHYSICS (Canvas 2D Rendering)
// ----------------------------------------------------------------------------
class ParticleSubsystem {
    constructor() {
        this.canvas = document.getElementById('fx-canvas'); 
        this.ctx = this.canvas.getContext('2d');
        this.particles = []; 
        this.handleResize(); 
        window.addEventListener('resize', () => this.handleResize()); 
        this.animationLoop();
    }
    
    handleResize() { 
        this.canvas.width = window.innerWidth; 
        this.canvas.height = window.innerHeight; 
    }
    
    emit(x, y, color, count) {
        for(let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 10 + 2;
            this.particles.push({
                x: x, y: y, 
                vx: Math.cos(angle) * speed, 
                vy: Math.sin(angle) * speed - 5, // Upward bias
                life: 1.0, 
                decay: Math.random() * 0.02 + 0.01, 
                color: color, 
                size: Math.random() * 6 + 2
            });
        }
    }
    
    emitAtDOMElement(elementId, color, count) {
        let el = document.getElementById(elementId); 
        if(!el) return;
        let rect = el.getBoundingClientRect();
        this.emit(rect.left + rect.width / 2, rect.top + rect.height / 2, color, count);
    }
    
    animationLoop() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        for(let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i]; 
            p.vy += 0.25; // Gravity
            p.x += p.vx; 
            p.y += p.vy; 
            p.life -= p.decay;
            
            if(p.life <= 0) {
                this.particles.splice(i, 1);
            } else { 
                this.ctx.globalAlpha = p.life; 
                this.ctx.fillStyle = p.color; 
                this.ctx.beginPath(); 
                this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); 
                this.ctx.fill(); 
            }
        }
        requestAnimationFrame(() => this.animationLoop());
    }
}
const VFX = new ParticleSubsystem();

// ----------------------------------------------------------------------------
// ENTITY DEFINITION: Player Class
// ----------------------------------------------------------------------------
class PlayerEntity {
    constructor(id, name, icon, colorHex) {
        this.id = id; 
        this.name = name; 
        this.icon = icon; 
        this.color = colorHex;
        
        this.position = 0; 
        this.acorns = 0; 
        this.allies = 0; 
        this.isFrozen = false;
    }
    
    modifyAcorns(amount) {
        // Prevent negative acorns
        let actualAmount = amount < 0 ? Math.min(this.acorns, Math.abs(amount)) : amount;
        this.acorns += amount < 0 ? -actualAmount : actualAmount;
        
        // Trigger particle effects if gaining
        if(actualAmount > 0) {
            VFX.emitAtDOMElement(`token-${this.id}`, '#FFD700', 40);
        }
    }
}

// ----------------------------------------------------------------------------
// UIMANAGER: Handles DOM Updates and Overlays
// ----------------------------------------------------------------------------
const UIManager = {
    
    // Builds the 14x9 matrix using CSS Grid
    buildTacticalBoard() {
        const grid = document.getElementById('tactical-matrix');
        
        MAP_DATA.forEach((space, index) => {
            let el = document.createElement('div'); 
            el.className = 'board-space';
            
            // Format space content based on type
            if (space.type === 'deck') {
                el.innerHTML = `<div class="space-question">?</div>`;
            } else if (space.type === 'stop') {
                el.innerHTML = `<div class="space-stop">${space.t}</div>`;
            } else {
                el.innerHTML = `<div class="space-label">${space.t}</div>`;
            }

            // Container for player tokens
            let nest = document.createElement('div'); 
            nest.className = 'token-nest'; 
            nest.id = `nest-${index}`; 
            el.appendChild(nest);

            // Calculate Grid Position for the Hollow Ring
            let col, row;
            if (index <= 13) { 
                row = 1; col = index + 1; 
            } else if (index <= 20) { 
                col = 14; row = (index - 13) + 1; 
            } else if (index <= 34) { 
                row = 9; col = 14 - (index - 21); 
            } else { 
                col = 1; row = 9 - (index - 34); 
            }
            
            el.style.gridColumn = col; 
            el.style.gridRow = row; 
            grid.appendChild(el);
        });
        
        this.updatePlayerTokens();
    },

    // Moves the player tokens to their current nest
    updatePlayerTokens(animateJump = false) {
        document.querySelectorAll('.token-nest').forEach(n => n.innerHTML = '');
        
        GameDirector.roster.forEach(player => {
            let token = document.createElement('div'); 
            
            // Apply animation class if this token is currently moving
            let isCurrentPlayer = (player.id === GameDirector.currentPlayerIndex);
            token.className = `entity-token ${animateJump && isCurrentPlayer ? 'anim-jump' : ''}`;
            token.id = `token-${player.id}`; 
            
            // Style with player specific color
            token.style.borderColor = player.color; 
            token.style.boxShadow = `inset 0 0 15px ${player.color}, 0 0 10px ${player.color}`;
            token.innerText = player.icon; 
            
            document.getElementById(`nest-${player.position}`).appendChild(token);
        });
    },

    // Refreshes the Sidebar Stats
    updateSidebar() {
        let container = document.getElementById('roster-list'); 
        container.innerHTML = '';
        
        GameDirector.roster.forEach((player, i) => {
            let isActive = (i === GameDirector.currentPlayerIndex) ? 'active-turn' : '';
            
            container.innerHTML += `
                <div class="player-card ${isActive}">
                    <div class="card-avatar">${player.icon}</div>
                    <div class="card-info">
                        <h3 style="color:${player.color}">${player.name}</h3>
                        <div class="card-stats">
                            <span class="stat-acorn">🌰 ${player.acorns}</span>
                            <span class="stat-ally">🤝 ${player.allies}</span>
                        </div>
                    </div>
                    ${player.isFrozen ? '<div class="status-badge">TRAPPED</div>' : ''}
                </div>
            `;
        });
    },

    // Adds text to the terminal UI
    printToLog(message, messageType = '') {
        let terminal = document.getElementById('sys-log');
        
        // Create timestamp
        let date = new Date();
        let timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}`;
        
        terminal.innerHTML = `<div class="log-entry ${messageType}">[${timeStr}] ${message}</div>` + terminal.innerHTML;
    },

    // Standard Modal popup
    triggerModal(title, bodyHTML, buttonsArray) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = bodyHTML;
        
        let btnContainer = document.getElementById('modal-actions'); 
        btnContainer.innerHTML = '';
        
        buttonsArray.forEach(btnData => {
            let buttonElement = document.createElement('button'); 
            buttonElement.className = 'btn-modal'; 
            buttonElement.innerText = btnData.text;
            buttonElement.onclick = () => { 
                document.getElementById('overlay-modal').style.display = 'none'; 
                btnData.action(); 
            };
            btnContainer.appendChild(buttonElement);
        });
        
        document.getElementById('overlay-modal').style.display = 'flex';
    },

    // 3D CSS Dice Roll Animation Sequence
    triggerDiceCinematic(playerName, rollResult, callbackFn) {
        let overlay = document.getElementById('overlay-dice');
        document.getElementById('dice-header').innerText = `${playerName} IS ROLLING...`;
        overlay.style.display = 'flex';
        
        let mesh = document.getElementById('dice-mesh');
        
        // Calculate a random 3D spin (Multiple full rotations)
        let rotX = Math.floor(Math.random() * 4) * 360 + 1080;
        let rotY = Math.floor(Math.random() * 4) * 360 + 1080;
        
        // Map the final face to specific rotation offsets to ensure the result is visible
        let finalRotX = 0, finalRotY = 0;
        switch(rollResult) { 
            case 1: finalRotX = 0; finalRotY = 0; break; 
            case 6: finalRotX = 0; finalRotY = -180; break; 
            case 3: finalRotX = 0; finalRotY = -90; break; 
            case 4: finalRotX = 0; finalRotY = 90; break; 
            case 2: finalRotX = -90; finalRotY = 0; break; 
            case 5: finalRotX = 90; finalRotY = 0; break; 
        }

        mesh.style.transform = `rotateX(${rotX + finalRotX}deg) rotateY(${rotY + finalRotY}deg)`;
        
        // Audio tick effect while spinning
        let spinAudioInterval = setInterval(() => AudioSYS.playDiceRoll(), 100);

        setTimeout(() => { 
            clearInterval(spinAudioInterval); 
            AudioSYS.playTrap(); // Impact sound
            
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                
                // Instantly reset rotation so next roll isn't broken
                mesh.style.transition = 'none'; 
                mesh.style.transform = `rotateX(0deg) rotateY(0deg)`; 
                
                // Restore transition property for next time
                setTimeout(() => { 
                    mesh.style.transition = 'transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; 
                    callbackFn(); 
                }, 50); 
                
            }, 800); 
        }, 1200);
    }
};

// ----------------------------------------------------------------------------
// GAMEDIRECTOR: Manages state, turns, and mechanic resolution
// ----------------------------------------------------------------------------
const GameDirector = {
    roster: [], 
    currentPlayerIndex: 0, 
    isExecutingSequence: false, 
    deckState: [], 
    discardState: [],

    // Transition from Lobby to Game Board
    initializeMatch() {
        const colorPalette = ["#ff9800", "#8d6e63", "#f44336", "#4caf50"];
        
        // Gather input from Lobby
        for(let i=1; i<=4; i++) {
            let nameInput = document.getElementById(`cfg-p${i}-name`).value.trim();
            if(nameInput === "") nameInput = `Player ${i}`;
            let iconInput = document.getElementById(`cfg-p${i}-icon`).value;
            
            this.roster.push(new PlayerEntity(i-1, nameInput, iconInput, colorPalette[i-1]));
        }
        
        // Shuffle the deck
        this.deckState = [...CARD_DATA].sort(() => Math.random() - 0.5);
        
        // Hide Lobby, Show Game UI
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('game-interface').style.display = 'flex';
        
        UIManager.buildTacticalBoard(); 
        UIManager.updateSidebar(); 
        UIManager.printToLog("INITIALIZATION COMPLETE. Awaiting command.", "sys");
        
        // Start random weather generator
        setInterval(() => this.processWeatherCycle(), 45000);
    },

    processWeatherCycle() {
        let weatherLayer = document.getElementById('layer-weather');
        
        // 30% chance for a blizzard to start/stop
        if(Math.random() > 0.7) { 
            weatherLayer.className = 'weather-blizzard'; 
            UIManager.printToLog("WARNING: Severe Blizzard rolling in.", "alert"); 
        } else { 
            weatherLayer.className = ''; 
        }
    },

    executeRollSequence() {
        if(this.isExecutingSequence) return; 
        
        let activePlayer = this.roster[this.currentPlayerIndex];
        
        // Check for frozen status from Avalanche trap
        if(activePlayer.isFrozen) { 
            UIManager.printToLog(`ACCESS DENIED: ${activePlayer.name} is trapped in ice. Turn skipped.`, "danger"); 
            AudioSYS.playTrap(); 
            activePlayer.isFrozen = false; 
            this.concludeTurn(); 
            return; 
        }

        // Lock controls
        this.isExecutingSequence = true; 
        document.getElementById('btn-master-roll').disabled = true;
        
        // Generate random 1-6
        let rollResult = Math.floor(Math.random() * 6) + 1;
        
        UIManager.triggerDiceCinematic(activePlayer.name, rollResult, () => { 
            UIManager.printToLog(`${activePlayer.name} rolled a ${rollResult}`); 
            this.processMovement(activePlayer, rollResult, false); 
        });
    },

    // Recursive function to step the player one space at a time
    processMovement(player, remainingSteps, isForcedMove) {
        if(remainingSteps === 0) { 
            this.isExecutingSequence = false; 
            
            // Remove jump animation class
            let tokenEl = document.getElementById(`token-${player.id}`); 
            if(tokenEl) tokenEl.classList.remove('anim-jump');
            
            this.evaluateLandingSpace(player, MAP_DATA[player.position]); 
            return; 
        }
        
        let direction = remainingSteps > 0 ? 1 : -1; 
        
        // Clamp position between 0 and 41
        player.position = Math.max(0, Math.min(41, player.position + direction));
        
        UIManager.updatePlayerTokens(true); 
        AudioSYS.playHop();

        // Jaap Stop Logic (Only applies if moving forward and not forced by an event)
        if(!isForcedMove && direction > 0 && MAP_DATA[player.position].type === 'stop') {
            UIManager.printToLog(`🛑 JAAP STOP ENGAGED. Movement forcefully halted.`, "alert"); 
            this.isExecutingSequence = false; 
            
            let tokenEl = document.getElementById(`token-${player.id}`); 
            if(tokenEl) tokenEl.classList.remove('anim-jump');
            
            this.evaluateLandingSpace(player, MAP_DATA[player.position]); 
            return;
        }
        
        // Delay next step for visual effect
        setTimeout(() => this.processMovement(player, direction > 0 ? remainingSteps - 1 : remainingSteps + 1, isForcedMove), 250);
    },

    // Triggers mechanic based on where player lands
    evaluateLandingSpace(player, spaceData) {
        UIManager.printToLog(`Coordinates Reached: [${spaceData.t}]`);
        
        switch(spaceData.type) {
            case 'start': 
            case 'free': 
            case 'stop': 
                this.concludeTurn(); 
                break;
                
            case 'acorn': 
                player.modifyAcorns(spaceData.v); 
                AudioSYS.playCoin(); 
                this.concludeTurn(); 
                break;
                
            case 'lose': 
                player.modifyAcorns(-spaceData.v); 
                AudioSYS.playTrap(); 
                this.concludeTurn(); 
                break;
                
            case 'ally': 
                player.allies++; 
                AudioSYS.playCoin(); 
                UIManager.printToLog(`${player.name} recruited an Ally.`); 
                this.concludeTurn(); 
                break;
                
            case 'move': 
                if(spaceData.av) { player.modifyAcorns(spaceData.av); AudioSYS.playCoin(); } 
                this.isExecutingSequence = true; 
                this.processMovement(player, spaceData.v, true); 
                break;
                
            case 'goto': 
                if(spaceData.av) { player.modifyAcorns(spaceData.av); AudioSYS.playCoin(); } 
                this.isExecutingSequence = true; 
                this.processMovement(player, spaceData.tgt - player.position, true); 
                break;
                
            case 'roll_again': 
                UIManager.printToLog(`BONUS ROUND: ${player.name} granted extra execution cycle.`, "alert"); 
                this.isExecutingSequence = false; 
                document.getElementById('btn-master-roll').disabled = false; 
                break;
                
            case 'adv_type': 
            case 'adv_type_acorn':
                // Find next space of target type (or start if looking for free space to wrap logic)
                let targetIndex = MAP_DATA.findIndex((s, i) => i > player.position && (s.type === spaceData.tgtType || (spaceData.tgtType==='free' && s.type==='start')));
                if(targetIndex > -1) { 
                    if(spaceData.av) { player.modifyAcorns(spaceData.av); AudioSYS.playCoin(); } 
                    this.isExecutingSequence = true; 
                    this.processMovement(player, targetIndex - player.position, true); 
                } else {
                    this.concludeTurn();
                }
                break;

            case 'deck': 
                this.resolveCardDraw(player); 
                break;
                
            case 'bridge': 
                this.resolveBridgeMinigame(player); 
                break;
                
            case 'trade': 
                this.resolveVillagerTrade(player); 
                break;

            case 'end': 
                UIManager.printToLog(`>>> FINISH LINE BREACHED BY ${player.name} <<<`, "alert"); 
                this.concludeTurn(); 
                break;
        }
        UIManager.updateSidebar();
    },

    resolveCardDraw(player) {
        // Reshuffle discard if deck is empty
        if(this.deckState.length === 0) { 
            this.deckState = [...this.discardState].sort(() => Math.random() - 0.5); 
            this.discardState = []; 
            UIManager.printToLog("Deck memory recompiled."); 
        }
        
        let card = this.deckState.pop(); 
        this.discardState.push(card);
        
        AudioSYS.playCardDraw();
        
        // CSS 3D Card HTML
        let cardHTML = `
            <div class="event-card">
                <div class="card-icon">${card.icon}</div>
                <div class="card-text">${card.text}</div>
            </div>`;
            
        UIManager.triggerModal("DISCARD PILE EVENT", cardHTML, [{ text: "PROCESS EVENT", action: () => {
            if(card.action === 'acorn') player.modifyAcorns(card.val);
            if(card.action === 'lose') player.modifyAcorns(-card.val);
            if(card.action === 'ally') player.allies += card.val;
            if(card.action === 'move') return this.processMovement(player, card.val, true);
            if(card.action === 'freeze') player.isFrozen = true;
            if(card.action === 'ambush') { 
                if(player.allies > 0) player.allies--; 
                else player.modifyAcorns(-2); 
            }
            this.concludeTurn();
        }}]);
    },

    resolveBridgeMinigame(player) {
        let text = "<p>Calculate trajectory across the fracturing ice bridge. Roll the die.<br><br><span style='color:var(--ui-cyan)'>[4-6] SURVIVE:</span> +2 🌰<br><span style='color:var(--text-red)'>[1-3] COLLAPSE:</span> Fall back 3 spaces.</p>";
        
        UIManager.triggerModal("ICE BRIDGE MINIGAME", text, [
            { text: "INITIATE ROLL", action: () => {
                let roll = Math.floor(Math.random() * 6) + 1;
                if(roll >= 4) {
                    player.modifyAcorns(2); 
                    AudioSYS.playCoin();
                    UIManager.triggerModal("TRAJECTORY SUCCESS", `<p>Rolled a ${roll}. You crossed the gap! (+2 🌰)</p>`, [{text: "CONTINUE", action: () => this.concludeTurn()}]);
                } else {
                    AudioSYS.playTrap();
                    UIManager.triggerModal("STRUCTURAL FAILURE", `<p>Rolled a ${roll}. The ice shattered under you!</p>`, [{text: "FALL BACK", action: () => this.processMovement(player, -3, true)}]);
                }
            }}
        ]);
    },

    resolveVillagerTrade(player) {
        let text = `<p>Current Inventory: <span style="color:var(--gold)">${player.acorns} 🌰</span> | <span style="color:var(--ui-cyan)">${player.allies} 🤝</span></p>`;
        
        UIManager.triggerModal("VILLAGER TRADING OUTPOST", text, [
            { text: "EXCHANGE: 4 🌰 -> 1 🤝", action: () => {
                if(player.acorns >= 4) { 
                    player.modifyAcorns(-4); 
                    player.allies++; 
                    AudioSYS.playCoin(); 
                    UIManager.updateSidebar(); 
                    this.resolveVillagerTrade(player); // Re-open trade window
                } else { 
                    AudioSYS.playTrap(); 
                    alert("Insufficient Acorns."); 
                    this.resolveVillagerTrade(player); 
                }
            }},
            { text: "EXCHANGE: 1 🤝 -> 2 🌰", action: () => {
                if(player.allies >= 1) { 
                    player.allies--; 
                    player.modifyAcorns(2); 
                    AudioSYS.playCoin(); 
                    UIManager.updateSidebar(); 
                    this.resolveVillagerTrade(player); 
                } else { 
                    AudioSYS.playTrap(); 
                    alert("Insufficient Allies."); 
                    this.resolveVillagerTrade(player); 
                }
            }},
            { text: "TERMINATE TRADE", action: () => this.concludeTurn() }
        ]);
    },

    concludeTurn() {
        this.isExecutingSequence = false;
        
        // Game Over Condition: All players are at space 41 (End)
        if(this.roster.every(pl => pl.position === 41)) {
            // Sort by acorns descending
            let winner = [...this.roster].sort((a,b) => b.acorns - a.acorns)[0];
            
            VFX.emit(window.innerWidth/2, window.innerHeight/2, '#FFD700', 200);
            
            UIManager.triggerModal("SIMULATION CONCLUDED", `
                <h2 style="font-size:3rem; margin-bottom:10px;">VICTOR: ${winner.name}</h2>
                <p style="font-size:2rem; color:var(--gold);">Score: ${winner.acorns} 🌰</p>
            `, [{ text: "REBOOT SIMULATION", action: () => location.reload() }]);
            return;
        }

        // Pass turn to next player, skipping players who have finished
        do { 
            this.currentPlayerIndex = (this.currentPlayerIndex + 1) % this.roster.length; 
        } while (this.roster[this.currentPlayerIndex].position === 41);

        document.getElementById('btn-master-roll').disabled = false; 
        UIManager.updateSidebar();
    }
};

</script>
